name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: socialmedia
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/socialmedia?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      NEXT_PUBLIC_BASE_URL: http://localhost:8080
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies and run API tests
        run: |
          cd api
          chmod +x mvnw
          ./mvnw -q test

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Install tests dependencies
        run: |
          cd tests
          npm ci

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Start API server
        run: |
          cd api
          chmod +x mvnw
          ./mvnw -q -DskipTests spring-boot:run > api.log 2>&1 &

      - name: Start API server
        run: |
          cd api
          chmod +x mvnw
          ./mvnw -q -DskipTests spring-boot:run > api.log 2>&1 &

      - name: Show API logs
        run: |
          sleep 20
          cat api/api.log

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8080 || true
          npx wait-on http://localhost:3000

      - name: Run client unit tests
        run: |
          cd client
          npm test -- --runInBand

      - name: Install Playwright browsers
        run: |
          cd tests
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd tests
          npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report
          path: tests/playwright-report/
